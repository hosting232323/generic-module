.deploy_template: &deploy_template
  stage: deploy
  tags:
    - deploy-combusken
  script:
    - git fetch origin "carpediembisceglie.it"
    - git checkout "carpediembisceglie.it"
    - |
      docker build \
        --build-arg VITE_HOSTNAME=$VITE_HOSTNAME \
        --build-arg VITE_FORM_MAIL=$CARPEDIEM_VITE_FORM_MAIL \
        -t $PJ_NAME:latest .
    
      set -e
      docker rm -f "${CONTAINER_NEXT}" 2>/dev/null || true
      docker run -d --name ${CONTAINER_NEXT} \
        -p ${SECOND_PORT}:3000 \
        $PJ_NAME:latest

      sleep 10

      if curl -fs http://localhost:$SECOND_PORT; then
        docker rm -f ${CONTAINER_ACTIVE} 2>/dev/null || true
        docker run -d --restart unless-stopped \
          --name ${CONTAINER_ACTIVE} \
          -p ${FIRST_PORT}:3000 \
          $PJ_NAME:latest
        docker rm -f ${CONTAINER_NEXT} 2>/dev/null || true
      else
        docker logs ${CONTAINER_NEXT} || true
        exit 1
      fi

deploy_test:
  <<: *deploy_template
  when: manual
  variables:
    PJ_NAME: "${CARPEDIEM_PROJECT_NAME}-test"
    CONTAINER_ACTIVE: "${CARPEDIEM_PROJECT_NAME}-test"
    CONTAINER_NEXT: "${CARPEDIEM_PROJECT_NAME}-test-next"
    VITE_HOSTNAME: $VITE_HOSTNAME_GENERIC_BE_TEST
  before_script:
    - export FIRST_PORT="${CARPEDIEM_PORT_TEST%%-*}"
    - export SECOND_PORT="${CARPEDIEM_PORT_TEST#*-}"

deploy_prod:
  <<: *deploy_template
  when: manual
  variables:
    PJ_NAME: $CARPEDIEM_PROJECT_NAME
    CONTAINER_ACTIVE: $CARPEDIEM_PROJECT_NAME
    CONTAINER_NEXT: "${CARPEDIEM_PROJECT_NAME}-next"
    VITE_HOSTNAME: $VITE_HOSTNAME_GENERIC_BE_PROD
  before_script:
    - export FIRST_PORT="${CARPEDIEM_PORT_PROD%%-*}"
    - export SECOND_PORT="${CARPEDIEM_PORT_PROD#*-}"
